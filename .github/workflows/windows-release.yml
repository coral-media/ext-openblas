name: windows release build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-extension-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extension-matrix.outputs.matrix }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: get extension matrix
        id: extension-matrix
        uses: php/php-windows-builder/extension-matrix@v1

  build:
    needs: get-extension-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.get-extension-matrix.outputs.matrix) }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\vcpkg"
          & "${{ github.workspace }}\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: select vcpkg triplet
        shell: pwsh
        run: |
          $triplet = if ("${{ matrix.arch }}" -eq "x86") { "x86-windows" } else { "x64-windows" }
          "VCPKG_TRIPLET=$triplet" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: install openblas
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install openblas:$env:VCPKG_TRIPLET
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: export openblas paths
        shell: pwsh
        run: |
          $root = "$env:VCPKG_ROOT\installed\$env:VCPKG_TRIPLET"
          "OPENBLAS_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PATH=$root\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: stage openblas into builder deps
        shell: pwsh
        run: |
          # The php-windows-builder passes /I "..\deps\include" and links from
          # "..\deps\lib" relative to its hash build subdirectory, so pre-populating
          # build\deps\ guarantees cblas.h and openblas.lib are found even if
          # OPENBLAS_ROOT does not propagate into configure.js at build time.
          $src  = "$env:VCPKG_ROOT\installed\$env:VCPKG_TRIPLET"
          $deps = "${{ github.workspace }}\build\deps"
          New-Item -ItemType Directory -Force "$deps\include", "$deps\lib", "$deps\bin" | Out-Null
          Copy-Item "$src\include\*"   "$deps\include" -Recurse -Force
          Copy-Item "$src\lib\*.lib"   "$deps\lib"     -Force
          Copy-Item "$src\bin\*.dll"   "$deps\bin"     -Force

      - name: build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: upload artifact to release
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
